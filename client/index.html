<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback Collector</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0e14;
    --surface:#111820;
    --surface-2:#1a2130;
    --border:#1e2a3a;
    --border-focus:#2c6def;
    --text:#c8d6e5;
    --text-bright:#f0f4f8;
    --text-dim:#5c6e83;
    --primary:#2c6def;
    --primary-soft:rgba(44,109,239,.1);
    --green:#34d399;
    --green-soft:rgba(52,211,153,.1);
    --red:#f87171;
    --red-soft:rgba(248,113,113,.1);
    --amber:#fbbf24;
    --radius:10px;
    --radius-lg:14px;
    --shadow:0 1px 3px rgba(0,0,0,.3);
  }
  html{height:100%}
  body{
    min-height:100%;
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.6;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:32px 16px;
    -webkit-font-smoothing:antialiased;
  }

  .app{
    width:100%;
    max-width:580px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }

  /* Header */
  .brand{
    display:flex;
    align-items:center;
    gap:12px;
    padding:4px 0 8px;
  }
  .brand-icon{
    width:36px;height:36px;
    background:var(--primary);
    border-radius:9px;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;
    flex-shrink:0;
  }
  .brand-text h1{
    font-size:16px;
    font-weight:700;
    color:var(--text-bright);
    letter-spacing:-.3px;
    line-height:1.3;
  }
  .brand-text p{
    font-size:11px;
    color:var(--text-dim);
    font-weight:500;
    letter-spacing:.3px;
    text-transform:uppercase;
  }

  /* Connection Status */
  .conn{
    display:flex;
    align-items:center;
    gap:8px;
    padding:8px 14px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
    font-size:12px;
    font-weight:500;
    color:var(--text-dim);
  }
  .conn-dot{
    width:7px;height:7px;
    border-radius:50%;
    flex-shrink:0;
  }
  .conn-dot.ok{background:var(--green)}
  .conn-dot.err{background:var(--red)}
  .conn-dot.wait{background:var(--primary);animation:blink 1.4s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

  /* Main Panel */
  .panel{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    overflow:hidden;
    transition:border-color .25s ease;
  }
  .panel.live{
    border-color:var(--primary);
  }

  .panel-label{
    padding:12px 18px;
    font-size:11px;
    font-weight:600;
    color:var(--text-dim);
    letter-spacing:.6px;
    text-transform:uppercase;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .panel-label .tag{
    display:inline-flex;
    align-items:center;
    gap:4px;
    padding:2px 8px;
    border-radius:20px;
    font-size:10px;
    font-weight:600;
    letter-spacing:.3px;
  }
  .tag-idle{background:var(--surface-2);color:var(--text-dim)}
  .tag-active{background:var(--primary-soft);color:var(--primary)}

  /* Question Display */
  .q-zone{
    padding:20px 18px;
    min-height:72px;
    display:flex;
    align-items:center;
  }
  .q-empty{
    color:var(--text-dim);
    font-size:13px;
    font-style:italic;
  }
  .q-text{
    font-size:14px;
    line-height:1.75;
    color:var(--text-bright);
    white-space:pre-wrap;
    word-break:break-word;
  }

  /* Input Area */
  .input-area{
    display:flex;
    gap:8px;
    padding:12px 18px 14px;
    border-top:1px solid var(--border);
    align-items:flex-end;
  }
  .input-area textarea{
    flex:1;
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:8px;
    padding:9px 12px;
    color:var(--text-bright);
    font-size:13px;
    font-family:inherit;
    line-height:1.5;
    resize:none;
    min-height:40px;
    max-height:160px;
    outline:none;
    transition:border-color .2s ease;
  }
  .input-area textarea:focus{border-color:var(--border-focus)}
  .input-area textarea::placeholder{color:var(--text-dim)}
  .input-area textarea:disabled{opacity:.4;cursor:not-allowed}

  .btn-send{
    height:40px;
    padding:0 20px;
    background:var(--primary);
    color:#fff;
    border:none;
    border-radius:8px;
    font-size:13px;
    font-weight:600;
    font-family:inherit;
    cursor:pointer;
    transition:opacity .15s ease,transform .1s ease;
    white-space:nowrap;
    flex-shrink:0;
  }
  .btn-send:hover:not(:disabled){opacity:.85}
  .btn-send:active:not(:disabled){transform:scale(.96)}
  .btn-send:disabled{opacity:.35;cursor:not-allowed}

  /* Quick Reply Chips */
  .quick-bar{
    display:none;
    gap:6px;
    padding:0 18px 12px;
    flex-wrap:wrap;
  }
  .quick-bar.show{display:flex}
  .chip{
    padding:5px 14px;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:20px;
    font-size:12px;
    font-weight:500;
    color:var(--text);
    cursor:pointer;
    transition:border-color .15s ease, color .15s ease;
    font-family:inherit;
  }
  .chip:hover{border-color:var(--primary);color:var(--primary)}

  /* History */
  .log{
    max-height:280px;
    overflow-y:auto;
  }
  .log::-webkit-scrollbar{width:5px}
  .log::-webkit-scrollbar-track{background:transparent}
  .log::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

  .log-empty{
    padding:20px 18px;
    text-align:center;
    color:var(--text-dim);
    font-size:12px;
    font-style:italic;
  }
  .log-item{
    padding:10px 18px;
    border-bottom:1px solid var(--border);
    font-size:12px;
    line-height:1.6;
  }
  .log-item:last-child{border-bottom:none}
  .log-role{
    font-weight:600;
    font-size:11px;
    letter-spacing:.3px;
    margin-bottom:2px;
  }
  .log-role.is-ai{color:var(--primary)}
  .log-role.is-user{color:var(--green)}
  .log-msg{
    color:var(--text-dim);
    white-space:pre-wrap;
    word-break:break-word;
  }

  /* Footer */
  /* Toggle Switch */
  .toggle-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 14px;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius);
  }
  .toggle-label{
    font-size:12px;
    font-weight:500;
    color:var(--text-dim);
    display:flex;
    align-items:center;
    gap:6px;
  }
  .toggle-label .mode-text{color:var(--text)}
  .toggle{
    position:relative;
    width:42px;height:22px;
    cursor:pointer;
  }
  .toggle input{display:none}
  .toggle-track{
    position:absolute;inset:0;
    background:var(--surface-2);
    border:1px solid var(--border);
    border-radius:11px;
    transition:background .2s,border-color .2s;
  }
  .toggle input:checked + .toggle-track{
    background:var(--primary);
    border-color:var(--primary);
  }
  .toggle-knob{
    position:absolute;
    top:3px;left:3px;
    width:16px;height:16px;
    background:#fff;
    border-radius:50%;
    transition:transform .2s;
    pointer-events:none;
  }
  .toggle input:checked ~ .toggle-knob{
    transform:translateX(20px);
  }

  .foot{
    text-align:center;
    font-size:11px;
    color:var(--text-dim);
    padding:4px 0;
  }
  .foot a{color:var(--primary);text-decoration:none}

  @media(max-width:480px){
    body{padding:16px 12px}
    .q-zone{padding:16px 14px}
    .input-area{padding:10px 14px 12px}
    .panel-label{padding:10px 14px}
    .log-item{padding:10px 14px}
    .quick-bar{padding:0 14px 10px}
  }
</style>
</head>
<body>
  <div class="app">
    <div class="brand">
      <div class="brand-icon">💬</div>
      <div class="brand-text">
        <h1>Feedback Collector</h1>
        <p>Human-in-the-Loop MCP Console</p>
      </div>
    </div>

    <div class="conn">
      <div class="conn-dot err" id="dot"></div>
      <span id="connLabel">Connecting...</span>
    </div>

    <div class="toggle-bar">
      <div class="toggle-label">
        Feedback Mode: <span class="mode-text" id="modeText">ON</span>
      </div>
      <label class="toggle">
        <input type="checkbox" id="modeToggle" checked>
        <div class="toggle-track"></div>
        <div class="toggle-knob"></div>
      </label>
    </div>

    <div class="panel" id="panel">
      <div class="panel-label">
        <span>AI Message</span>
        <span class="tag tag-idle" id="stateTag">IDLE</span>
      </div>
      <div class="q-zone">
        <div class="q-empty" id="qText">Waiting for AI...</div>
      </div>
      <div class="quick-bar" id="quickBar">
        <button class="chip" data-v="继续">继续</button>
        <button class="chip" data-v="好的，没问题">好的</button>
        <button class="chip" data-v="请重新做一遍">重做</button>
        <button class="chip" data-v="结束本轮对话">结束</button>
      </div>
      <div class="input-area">
        <textarea id="input" placeholder="Type your feedback..." rows="1" disabled></textarea>
        <button class="btn-send" id="sendBtn" disabled>Send</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-label">History</div>
      <div class="log" id="log">
        <div class="log-empty">No messages yet</div>
      </div>
    </div>

    <div class="foot">
      <a href="https://clawhub.ai/" target="_blank">OpenClaw</a> &middot; skill-feedback-collector v1.0.0
    </div>
  </div>

<script>
(function(){
  const dot        = document.getElementById("dot");
  const connLabel  = document.getElementById("connLabel");
  const panel      = document.getElementById("panel");
  const stateTag   = document.getElementById("stateTag");
  const qText      = document.getElementById("qText");
  const quickBar   = document.getElementById("quickBar");
  const input      = document.getElementById("input");
  const sendBtn    = document.getElementById("sendBtn");
  const log        = document.getElementById("log");
  const modeToggle = document.getElementById("modeToggle");
  const modeText   = document.getElementById("modeText");

  let ws = null;
  let hasHistory = false;
  let transport = "none"; // "ws" | "poll" | "none"
  let pollSeq = 0;
  let pollActive = false;
  let currentPending = false;

  const baseUrl = location.origin;
  const wsUrl = (location.protocol === "https:" ? "wss:" : "ws:") + "//" + location.host;

  function setConn(state, label){
    dot.className = "conn-dot " + state;
    connLabel.textContent = label;
  }

  function setEditable(on){
    input.disabled = !on;
    sendBtn.disabled = !on;
    if(on) input.focus();
  }

  function pushLog(role, text, ts){
    if(!hasHistory){ log.innerHTML = ""; hasHistory = true; }
    const el = document.createElement("div");
    el.className = "log-item";
    const r = document.createElement("div");
    r.className = "log-role " + (role === "ai" ? "is-ai" : "is-user");
    const timeStr = ts ? new Date(ts).toLocaleString() : new Date().toLocaleString();
    r.textContent = (role === "ai" ? "AI" : "YOU") + "  ·  " + timeStr;
    const m = document.createElement("div");
    m.className = "log-msg";
    m.textContent = text;
    el.appendChild(r);
    el.appendChild(m);
    log.insertBefore(el, log.firstChild);
  }

  function loadHistory(){
    fetch(baseUrl + "/api/history")
      .then(function(r){ return r.json(); })
      .then(function(items){
        if(!items || !items.length) return;
        items.reverse().forEach(function(e){
          pushLog(e.role === "ai" ? "ai" : "user", e.text, e.timestamp);
        });
      })
      .catch(function(){});
  }
  loadHistory();

  function syncMode(enabled){
    modeToggle.checked = enabled;
    modeText.textContent = enabled ? "ON" : "OFF";
  }

  function showQuestion(reason){
    if(currentPending) return;
    currentPending = true;
    qText.className = "q-text";
    qText.textContent = reason;
    panel.classList.add("live");
    stateTag.className = "tag tag-active";
    stateTag.textContent = "WAITING";
    quickBar.classList.add("show");
    setConn("wait", "AI is waiting for your feedback" + (transport === "poll" ? " [HTTP]" : ""));
    setEditable(true);
    pushLog("ai", reason);
  }

  function clearQuestion(){
    currentPending = false;
    qText.className = "q-empty";
    qText.textContent = "Waiting for AI...";
    panel.classList.remove("live");
    stateTag.className = "tag tag-idle";
    stateTag.textContent = "IDLE";
    quickBar.classList.remove("show");
    var mode = transport === "ws" ? "" : " [HTTP]";
    setConn("ok", "Connected" + mode);
    setEditable(false);
    input.value = "";
  }

  function sendFeedback(){
    var t = input.value.trim();
    if(!t) return;

    if(transport === "ws" && ws && ws.readyState === WebSocket.OPEN){
      ws.send(JSON.stringify({ type: "feedback", text: t }));
      pushLog("user", t);
      clearQuestion();
    } else {
      fetch(baseUrl + "/api/feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: t })
      }).then(function(r){ return r.json(); })
        .then(function(d){
          if(d.ok){
            pushLog("user", t);
            clearQuestion();
          }
        })
        .catch(function(){});
    }
  }

  function toggleMode(enabled){
    if(transport === "ws" && ws && ws.readyState === WebSocket.OPEN){
      ws.send(JSON.stringify({ type: "toggle", enabled: enabled }));
    } else {
      fetch(baseUrl + "/api/toggle", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ enabled: enabled })
      }).catch(function(){});
    }
  }

  sendBtn.addEventListener("click", sendFeedback);
  input.addEventListener("keydown", function(e){
    if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); sendFeedback(); }
  });
  input.addEventListener("input", function(){
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 160) + "px";
  });
  quickBar.addEventListener("click", function(e){
    var chip = e.target.closest(".chip");
    if(!chip) return;
    input.value = chip.dataset.v;
    sendFeedback();
  });
  modeToggle.addEventListener("change", function(){
    var enabled = modeToggle.checked;
    modeText.textContent = enabled ? "ON" : "OFF";
    toggleMode(enabled);
  });

  // --- WebSocket transport ---
  var wsFails = 0;

  function connectWs(){
    if(ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
    setConn("err", "Connecting (WebSocket)...");

    try { ws = new WebSocket(wsUrl); } catch(e) {
      fallbackToPoll();
      return;
    }

    var openTimer = setTimeout(function(){
      if(ws.readyState !== WebSocket.OPEN){ ws.close(); fallbackToPoll(); }
    }, 5000);

    ws.onopen = function(){
      clearTimeout(openTimer);
      wsFails = 0;
      transport = "ws";
      setConn("ok", "Connected");
    };
    ws.onmessage = function(evt){
      try{
        var d = JSON.parse(evt.data);
        if(d.type === "question" && d.reason) showQuestion(d.reason);
        else if(d.type === "resolved") clearQuestion();
        else if(d.type === "mode") syncMode(!!d.enabled);
      }catch(e){/* ignore */}
    };
    ws.onclose = function(){
      clearTimeout(openTimer);
      wsFails++;
      if(wsFails >= 3){
        fallbackToPoll();
      } else {
        setConn("err", "Reconnecting...");
        setEditable(false);
        setTimeout(connectWs, 2000);
      }
    };
    ws.onerror = function(){ ws.close(); };
  }

  // --- HTTP Polling fallback ---
  function fallbackToPoll(){
    transport = "poll";
    setConn("ok", "Connected [HTTP]");
    if(!pollActive) startPolling();
  }

  function startPolling(){
    pollActive = true;
    poll();
  }

  function poll(){
    if(transport !== "poll"){ pollActive = false; return; }

    fetch(baseUrl + "/api/poll?seq=" + pollSeq)
      .then(function(r){ return r.json(); })
      .then(function(d){
        pollSeq = d.seq || pollSeq;
        syncMode(!!d.enabled);
        if(d.pending && d.reason && !currentPending){
          showQuestion(d.reason);
        } else if(!d.pending && currentPending){
          clearQuestion();
        }
        if(!d.pending && !currentPending){
          setConn("ok", "Connected [HTTP]");
        }
        setTimeout(poll, 100);
      })
      .catch(function(){
        setConn("err", "Connection lost — retrying...");
        setTimeout(poll, 3000);
      });
  }

  // --- Init: try WebSocket first, fallback to HTTP polling ---
  connectWs();
})();
</script>
</body>
</html>
